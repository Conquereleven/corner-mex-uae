name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  contract-and-migration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: catalog_rollback_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run validate:no-railway-writes
      - run: npm run validate:deployment-governance
      - run: npm run validate:program-state
      - run: npm run validate:production-activation-request -- docs/program/PRODUCTION_ACTIVATION_REQUEST.example.json
      - run: npm run validate:staging-readiness-change-request -- docs/program/STAGING_READINESS_CHANGE_REQUEST.example.json
      - run: node --test tests/program/*.test.mjs
      - run: npm run test:alignment
      - run: npm run validate:a2-migration
      - run: npm run test:a2
      - run: npm run validate:a3:inventory
      - run: npm run validate:a3:mapping
      - run: npm run test:a3
      - run: npm run rehearse:a3
      - run: npm run reconcile:a3
      - run: npm run privacy:a3
        env:
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_BEFORE: ${{ github.event.before }}
      - run: npm run validate:a3:target-clean-evidence
      - run: npm run validate:a3-2a:readiness
      - run: npm run validate:a3-2a:callbacks
      - run: npm run validate:a3-2a:founder-decisions
      - run: npm run validate:db1-custody
      - run: npm run test:a3-2a
      - run: npm run test:a3-2b
        env:
          CORNEROPS_SOURCE_SHA: a8a751bdbaf2b12fef3f94c83769bac52fffbaad
          PGHOST: 127.0.0.1
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: catalog_rollback_test
      - run: npm run validate:a3-2b:decisions
      - run: npm run validate:a3-2b:readiness
      - run: npm run test:pr9-remediation
      - run: npm run verify:a3:activation-readiness -- --ci-static
      - run: npm run lint:changed

  type-and-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm run build:railway
      - run: npm run validate:browser-secrets
      - name: Node server health smoke
        run: |
          PORT=3000 npm run start:railway > /tmp/cornermex-server.log 2>&1 &
          pid=$!
          trap 'kill $pid' EXIT
          for attempt in {1..30}; do
            curl --fail --silent http://127.0.0.1:3000/api/health && exit 0
            sleep 1
          done
          cat /tmp/cornermex-server.log
          exit 1

  schema-authority:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: canonical_replay
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d canonical_replay"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: canonical_replay
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run validate:migration-ownership
      - run: npm run validate:canonical-types
      - run: npm run validate:application-schema-references
      - run: npm run validate:schema-authority
      - run: npm run test:canonical-migration-replay
      - run: git diff --check origin/${{ github.base_ref || 'main' }}...HEAD

  merged-tree-verification:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: canonical_replay
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d canonical_replay"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: canonical_replay
      MERGED_TREE_EXPECTED_SHA: ${{ github.sha }}
      MERGED_TREE_BASE_SHA: ${{ github.event.pull_request.base.sha }}
      MERGED_TREE_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm run validate:merged-tree
