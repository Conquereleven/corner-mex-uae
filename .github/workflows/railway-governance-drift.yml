name: Railway Governance Drift Guard

# Read-only. This workflow never deploys, restarts, rolls back, or modifies Railway
# configuration or variables — see scripts/program/assert-no-railway-writes.mjs, which
# statically scans the guard scripts and this file for forbidden write operations as part of
# every run below.
#
# On pull_request and workflow_dispatch without a live credential, this only runs the static
# validators and the write-operation scan (no Railway network access, no secrets required).
# Route B removes the schedule. A future manual probe remains doubly gated by the repository
# variable and a dedicated OAuth project:viewer secret — see
# docs/program/DEPLOYMENT_GOVERNANCE.md ("Validator scope") for why this is a separate job from
# the static repository-consistency checks in ci.yml.

on:
  pull_request:
    branches: [main]
    paths:
      - "docs/program/DEPLOYMENT_REGISTRY.json"
      - "scripts/program/check-railway-live-governance.mjs"
      - "scripts/program/railway-live-client.mjs"
      - "scripts/program/run-railway-live-governance.mjs"
      - "scripts/program/assert-no-railway-writes.mjs"
      - "tests/program/railway-live-governance.test.mjs"
      - "tests/program/no-railway-writes.test.mjs"
      - ".github/workflows/railway-governance-drift.yml"
  workflow_dispatch:
    inputs:
      run_live_probe:
        description: "Run the deferred probe (requires explicit activation and OAuth project:viewer)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  static-governance-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node scripts/program/assert-no-railway-writes.mjs
      - run: npm run validate:deployment-governance
      - run: npm run validate:program-state
      - run: node --test tests/program/*.test.mjs
      - name: Monitoring activation summary
        if: vars.RAILWAY_LIVE_MONITORING_ENABLED != 'true'
        run: |
          echo "## Railway governance monitoring" >> "$GITHUB_STEP_SUMMARY"
          echo "Result: **monitoring_not_activated**" >> "$GITHUB_STEP_SUMMARY"
          echo "The comparator and static checks ran; no live Railway request was attempted." >> "$GITHUB_STEP_SUMMARY"

  live-drift-guard:
    needs: static-governance-checks
    runs-on: ubuntu-latest
    if: vars.RAILWAY_LIVE_MONITORING_ENABLED == 'true' && github.event_name == 'workflow_dispatch' && github.event.inputs.run_live_probe == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node scripts/program/assert-no-railway-writes.mjs
      - name: Run live drift guard (fails closed; missing credential is honestly reported, not silently green)
        env:
          RAILWAY_OAUTH_PROJECT_VIEWER_TOKEN: ${{ secrets.RAILWAY_OAUTH_PROJECT_VIEWER_TOKEN }}
        run: node scripts/program/run-railway-live-governance.mjs
